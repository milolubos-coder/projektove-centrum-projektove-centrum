<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projektové centrum (G4S)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Ikony) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Rozdelenie štýlov pre tlač bežného reportu a Ganttovho diagramu */
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            .print\:static { position: static !important; }
            @page { margin: 0; size: A4 portrait; }
            
            /* Ak tlačíme bežný report (Harmonogram), skryjeme sekciu Gantt */
            body:not(.printing-gantt) .print-gantt-only { display: none !important; }
            body:not(.printing-gantt) .print-report-only { display: block !important; }
            
            /* Ak tlačíme Gantt, skryjeme bežný report a naopak ho zobrazíme na šírku (landscape) */
            body.printing-gantt .print-report-only { display: none !important; }
            body.printing-gantt .print-gantt-only { display: block !important; }
            body.printing-gantt @page { size: A4 landscape; }
        }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- VERZIA APLIKÁCIE ---
        const APP_VERSION = "Verzia: 12.03.2026, 21:30 (Iba Harmonogram v PDF & Fix pre Safari Tlač)";

        // ==========================================
        // VÁŠ FIREBASE KĽÚČ
        // ==========================================
        const myFirebaseConfig = {
          apiKey: "AIzaSyBLFs7Bl87JY1IzrpG3ikcaOIo5b8LHY5g",
          authDomain: "g4s-projektove-centrum.firebaseapp.com",
          projectId: "g4s-projektove-centrum",
          storageBucket: "g4s-projektove-centrum.firebasestorage.app",
          messagingSenderId: "352515331262",
          appId: "1:352515331262:web:4785b14e05bbf8b7d47aef"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'g4s-tracker';
        const app = initializeApp(myFirebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // ==========================================

        const Icon = ({ name, size = 16, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const STATUS_OPTIONS = [
          { value: '1', label: '1. Nevyriešené', color: 'bg-red-100 text-red-800' },
          { value: '2', label: '2. V riešení', color: 'bg-blue-100 text-blue-800' },
          { value: '3', label: '3. Vyriešené', color: 'bg-green-100 text-green-800' },
        ];

        const LOGO_URL = "image_1e7ca9.png"; 

        const StatusSelect = ({ value, onChange }) => (
          <select value={value} onChange={e => onChange(e.target.value)} className={`w-full p-1 rounded outline-none border-transparent focus:border-blue-500 focus:ring-1 focus:ring-blue-500 ${STATUS_OPTIONS.find(o => o.value === value)?.color || 'bg-white'}`}>
            {STATUS_OPTIONS.map(opt => <option key={opt.value} value={opt.value} className="bg-white text-gray-900">{opt.label}</option>)}
          </select>
        );

        const UserSelect = ({ value, onChange, users, departments }) => (
          <select value={value} onChange={e => onChange(e.target.value)} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500">
            <option value="">-- Nepriradené --</option>
            {departments.map(dept => (
              <optgroup key={dept.id} label={`${dept.prefix} ${dept.name}`}>
                {users.filter(u => u.deptId === dept.id).map(u => (
                  <option key={u.id} value={u.id}>{u.prefix} {u.name}</option>
                ))}
              </optgroup>
            ))}
          </select>
        );

        const InputCell = ({ value, onChange, type = "text", placeholder = "" }) => (
          <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500" />
        );

        const INITIAL_DB_STATE = {
          admins: [], 
          departments: [
            { id: 'd1', prefix: '1.', name: 'ĽZ/nábor' },
            { id: 'd2', prefix: '2.', name: 'Ostraha' }
          ],
          globalUsers: [
            { id: 'u1', deptId: 'd1', prefix: '1.1.', name: 'Lenka A.', email: 'lenka@firma.sk', notifyDays: 3 },
            { id: 'u2', deptId: 'd1', prefix: '1.2.', name: 'Pavel K.', email: 'pavel@firma.sk', notifyDays: 1 },
            { id: 'u3', deptId: 'd2', prefix: '2.1.', name: 'Ján Novák (BOZP)', email: 'jan.novak@firma.sk', notifyDays: 3 },
          ],
          projects: [
            {
              id: 'p1', name: 'Projekt: Rekonštrukcia pobočky', isTemplate: false, lastModified: new Date().toLocaleDateString('sk-SK'),
              allowedUsers: ['u3', 'u1'],
              contacts: [{ id: 'c1', name: 'Karol Zima', position: 'Manažér pobočky', email: 'karol.zima@firma.sk', phone: '+421 900 123 456' }],
              tasks: [
                { id: 't1', wbs: '1.', name: 'BOZP', startDate: '', deadline: '', assignedTo: 'u3', status: '1', notes: 'Zabezpečiť úvodné školenie', link: '' }
              ],
              assets: [{ id: 'a1', name: 'Ochranné prilby', quantity: 15, unitPrice: 450, assignedTo: 'u3', status: '3' }]
            }
          ]
        };

        function App() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [appState, setAppState] = useState(null);
          const [loading, setLoading] = useState(true);
          const [dbError, setDbError] = useState(false);

          const [activeTab, setActiveTab] = useState('harmonogram');
          const [dashboardTab, setDashboardTab] = useState('projects');

          const [draggedTaskIndex, setDraggedTaskIndex] = useState(null);
          const [draggedAssetIndex, setDraggedAssetIndex] = useState(null);
          const [draggedContactIndex, setDraggedContactIndex] = useState(null);

          const [showNewProjectModal, setShowNewProjectModal] = useState(false);
          const [newProjectName, setNewProjectName] = useState('');
          const [selectedTemplateId, setSelectedTemplateId] = useState('');
          const [newProjectAllowedUsers, setNewProjectAllowedUsers] = useState([]); 
          
          const [showAccessModal, setShowAccessModal] = useState(null); 

          const [activeProjectId, setActiveProjectId] = useState(null);
          const [newAdminUid, setNewAdminUid] = useState('');

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setAuthLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            const unsubscribe = onSnapshot(stateRef, (docSnap) => {
              if (docSnap.exists()) {
                setAppState(docSnap.data());
                setLoading(false);
              } else {
                const defaultDb = { ...INITIAL_DB_STATE, admins: [user.uid] };
                setDoc(stateRef, defaultDb);
              }
            }, (error) => {
              console.error("Firestore sync error:", error);
              setDbError(true);
            });
            return () => unsubscribe();
          }, [user]);

          // Event listener pre vyčistenie tried po tlači (čisté riešenie pre Safari)
          useEffect(() => {
            const handleAfterPrint = () => {
              document.body.classList.remove('printing-gantt');
            };
            window.addEventListener('afterprint', handleAfterPrint);
            return () => window.removeEventListener('afterprint', handleAfterPrint);
          }, []);

          const handleLogin = async () => {
            try {
              await signInWithPopup(auth, googleProvider);
            } catch (error) {
              console.error("Chyba pri prihlásení:", error);
              alert("Nepodarilo sa prihlásiť.");
            }
          };

          const handleLogout = () => signOut(auth);

          const updateCloudState = async (updates) => {
            if (!user || !appState) return;
            setAppState(prev => ({ ...prev, ...updates }));
            const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            try { await setDoc(stateRef, { ...appState, ...updates }, { merge: true }); } 
            catch (e) { console.error("Error saving to cloud:", e); }
          };

          // --- PRIAME VOLANIA TLAČE BEZ ČASOVAČA (FIX PRE SAFARI) ---
          const handlePrintReport = () => {
            document.body.classList.remove('printing-gantt');
            window.print();
          };

          const handlePrintGantt = () => {
            document.body.classList.add('printing-gantt');
            window.print();
          };

          if (authLoading) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
                <Icon name="circle-notch" className="fa-spin text-blue-600 mb-4" size={40} />
                <p className="text-gray-500 font-medium">Overovanie prístupu...</p>
              </div>
            );
          }

          if (!user) {
            return (
              <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-gray-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                  <img src={LOGO_URL} alt="Logo" className="h-16 object-contain mx-auto mb-6" />
                  <h1 className="text-2xl font-bold text-gray-800 mb-2">Projektové centrum</h1>
                  <p className="text-gray-500 mb-8 text-sm">Pre prístup k harmonogramom a projektom je potrebné sa prihlásiť vaším pracovným účtom.</p>
                  
                  <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm">
                    <Icon name="google" className="text-red-500 fa-brands" size={18} />
                    Prihlásiť sa cez Google
                  </button>
                  
                  <div className="mt-8 flex items-center justify-center gap-2 text-xs text-gray-400">
                    <Icon name="lock" size={12} /> Zabezpečené prostredie G4S
                  </div>
                </div>
              </div>
            );
          }

          if (dbError) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-center">
                <Icon name="ban" size={64} className="text-red-400 mb-4" />
                <h1 className="text-2xl font-bold text-gray-800 mb-2">Chyba pripojenia k databáze</h1>
                <p className="text-gray-600 max-w-md">Skontrolujte pripojenie na internet alebo kontaktujte správcu.</p>
                <button onClick={handleLogout} className="mt-6 text-blue-600 underline">Odhlásiť sa</button>
              </div>
            );
          }

          if (loading || !appState) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
                <Icon name="circle-notch" className="fa-spin text-blue-600 mb-4" size={40} />
                <p className="text-gray-500 font-medium animate-pulse">Sťahovanie projektov zo servera...</p>
              </div>
            );
          }

          const isAdmin = appState.admins?.includes(user?.uid);
          const currentUserObj = appState.globalUsers?.find(u => u.email && u.email.toLowerCase() === user?.email?.toLowerCase());
          const isInvited = !!currentUserObj;
          const hasAccess = isAdmin || isInvited;

          if (!hasAccess) {
            return (
              <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4 text-center">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-2 bg-red-500"></div>
                  <Icon name="lock" size={48} className="text-red-500 mb-4" />
                  <h1 className="text-2xl font-bold text-gray-800 mb-2">Prístup zamietnutý</h1>
                  <p className="text-gray-600 mb-6">Účet <b>{user.email}</b> nemá povolený prístup do tejto aplikácie.</p>
                  <p className="text-sm text-gray-500 mb-6 border-t pt-4">Prístup musí najskôr vytvoriť Administrátor pridaním vášho e-mailu do zoznamu zamestnancov.</p>
                  <div className="bg-gray-50 p-3 rounded text-left mb-6 text-xs text-gray-500">
                    Ak máte byť Administrátor, pošlite tento kód vášmu správcovi:<br/>
                    <code className="block mt-1 font-mono text-gray-800 bg-gray-200 px-2 py-1 rounded select-all break-all">{user.uid}</code>
                  </div>
                  <button onClick={handleLogout} className="w-full bg-gray-800 hover:bg-gray-900 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                    Odhlásiť sa
                  </button>
                </div>
              </div>
            );
          }

          if (!isAdmin && dashboardTab === 'users') setDashboardTab('projects');

          const projects = appState.projects || [];
          const departments = appState.departments || [];
          const globalUsers = appState.globalUsers || [];
          
          const currentProject = projects.find(p => String(p.id) === String(activeProjectId));

          const updateCurrentProject = (updater) => {
            updateCloudState({ projects: projects.map(p => p.id === activeProjectId ? { ...updater(p), lastModified: new Date().toLocaleDateString('sk-SK') } : p) });
          };

          const handleCreateProjectSubmit = () => {
            const newId = Date.now().toString();
            let finalAllowedUsers = [...newProjectAllowedUsers];
            if (!isAdmin && currentUserObj && !finalAllowedUsers.includes(currentUserObj.id)) {
              finalAllowedUsers.push(currentUserObj.id);
            }

            let newProject = { 
              id: newId, 
              name: newProjectName || 'Nový projekt', 
              isTemplate: false, 
              lastModified: new Date().toLocaleDateString('sk-SK'), 
              allowedUsers: finalAllowedUsers,
              contacts: [], tasks: [], assets: [] 
            };
            
            if (selectedTemplateId && isAdmin) {
              const template = projects.find(p => String(p.id) === String(selectedTemplateId));
              if(template) {
                newProject = JSON.parse(JSON.stringify(template)); 
                newProject.id = newId;
                newProject.name = newProjectName || `Nový projekt (z ${template.name})`;
                newProject.isTemplate = false;
                newProject.lastModified = new Date().toLocaleDateString('sk-SK');
                newProject.allowedUsers = finalAllowedUsers;
              }
            }
            updateCloudState({ projects: [...projects, newProject] });
            setActiveProjectId(newId);
            setShowNewProjectModal(false);
            setNewProjectName('');
            setSelectedTemplateId('');
            setNewProjectAllowedUsers([]);
          };

          const createFromTemplate = (template) => {
            const newProject = JSON.parse(JSON.stringify(template)); 
            newProject.id = Date.now().toString();
            newProject.name = `Nový projekt (z ${template.name})`;
            newProject.isTemplate = false;
            newProject.lastModified = new Date().toLocaleDateString('sk-SK');
            newProject.allowedUsers = currentUserObj ? [currentUserObj.id] : [];
            
            updateCloudState({ projects: [...projects, newProject] });
            setActiveProjectId(newProject.id);
          };

          const deleteProject = (id) => {
            if(confirm('Naozaj chcete túto položku zmazať zo servera pre všetkých?')) updateCloudState({ projects: projects.filter(p => p.id !== id) });
          };

          const saveAccessChanges = (projectId, newAllowedList) => {
             updateCloudState({ projects: projects.map(p => p.id === projectId ? { ...p, allowedUsers: newAllowedList } : p) });
             setShowAccessModal(null);
          };

          // --- VYKRESLENIE HLAVNEJ OBRAZOVKY (DASHBOARD) ---
          if (!activeProjectId) {
            const myProjects = projects.filter(p => {
              if (p.isTemplate) return false;
              if (isAdmin) return true;
              return p.allowedUsers && currentUserObj && p.allowedUsers.includes(currentUserObj.id);
            });
            const myTemplates = projects.filter(p => p.isTemplate);

            return (
              <div className="min-h-screen bg-gray-50 p-8 font-sans relative flex flex-col">
                
                {/* MODAL - Nový projekt s výberom práv */}
                {showNewProjectModal && (
                  <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                      <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                        <h3 className="font-bold text-lg text-gray-800">Vytvoriť nový projekt</h3>
                        <button onClick={() => setShowNewProjectModal(false)} className="text-gray-400 hover:text-gray-600 p-1"><Icon name="xmark" size={20} /></button>
                      </div>
                      <div className="p-6 space-y-6 overflow-y-auto">
                        <div>
                          <label className="block text-sm font-medium text-gray-700 mb-1">Názov projektu</label>
                          <input type="text" value={newProjectName} onChange={(e) => setNewProjectName(e.target.value)} placeholder="Napr. Inštalácia kamier - Pobočka Bratislava" className="w-full p-2 border border-gray-300 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none" autoFocus />
                        </div>
                        
                        {isAdmin && (
                          <div>
                            <label className="block text-sm font-medium text-gray-700 mb-1">Použiť šablónu</label>
                            <select value={selectedTemplateId} onChange={(e) => setSelectedTemplateId(e.target.value)} className="w-full p-2 border border-gray-300 rounded focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none bg-white">
                              <option value="">-- Prázdny projekt --</option>
                              {myTemplates.map(tpl => <option key={tpl.id} value={tpl.id}>{tpl.name}</option>)}
                            </select>
                          </div>
                        )}
                        
                        {isAdmin && (
                          <div className="bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                            <label className="block text-sm font-bold text-gray-800 mb-2 flex items-center gap-2"><Icon name="users-gear"/> Kto bude mať k projektu prístup?</label>
                            <p className="text-xs text-gray-500 mb-4">Administrátori vidia všetky projekty automaticky. Vyberte používateľov, ktorí tento projekt uvidia na svojej ploche.</p>
                            <div className="max-h-60 overflow-y-auto bg-white border border-gray-200 rounded p-2">
                              {departments.map(dept => {
                                const deptUsers = globalUsers.filter(u => u.deptId === dept.id);
                                if (deptUsers.length === 0) return null;
                                return (
                                  <div key={dept.id} className="mb-3 last:mb-0 bg-gray-50/50 p-2 rounded border border-gray-100">
                                    <div className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1 border-b border-gray-200 pb-1">{dept.prefix} {dept.name}</div>
                                    <div className="space-y-1">
                                      {deptUsers.map(u => {
                                        const isChecked = newProjectAllowedUsers.includes(u.id);
                                        return (
                                          <label key={u.id} className="flex items-center gap-2 p-1.5 hover:bg-blue-50 rounded cursor-pointer ml-1 transition-colors border-l-2 border-transparent hover:border-blue-300">
                                            <input type="checkbox" checked={isChecked} onChange={(e) => {
                                              if (e.target.checked) setNewProjectAllowedUsers([...newProjectAllowedUsers, u.id]);
                                              else setNewProjectAllowedUsers(newProjectAllowedUsers.filter(id => id !== u.id));
                                            }} className="w-4 h-4 text-blue-600 rounded focus:ring-blue-500"/>
                                            <span className="text-sm text-gray-800 font-medium">{u.prefix} {u.name} <span className="text-gray-400 text-xs font-normal ml-1">({u.email})</span></span>
                                          </label>
                                        );
                                      })}
                                    </div>
                                  </div>
                                );
                              })}
                              {globalUsers.length === 0 && <div className="text-xs text-gray-500 italic p-2 text-center">Zatiaľ nie sú v systéme žiadni zamestnanci.</div>}
                            </div>
                          </div>
                        )}

                      </div>
                      <div className="p-4 border-t bg-gray-50 flex justify-end gap-3 mt-auto">
                        <button onClick={() => setShowNewProjectModal(false)} className="px-4 py-2 text-sm font-medium text-gray-600 hover:bg-gray-200 rounded-md transition-colors">Zrušiť</button>
                        <button onClick={handleCreateProjectSubmit} className="px-4 py-2 bg-blue-600 text-white text-sm font-medium rounded-md hover:bg-blue-700 transition-colors shadow-sm">Vytvoriť</button>
                      </div>
                    </div>
                  </div>
                )}

                {/* MODAL - Úprava práv pre existujúci projekt */}
                {showAccessModal && (
                  <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden flex flex-col">
                      <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                        <h3 className="font-bold text-lg text-gray-800">Úprava prístupov</h3>
                        <button onClick={() => setShowAccessModal(null)} className="text-gray-400 hover:text-gray-600 p-1"><Icon name="xmark" size={20} /></button>
                      </div>
                      <div className="p-6">
                        <p className="text-sm text-gray-600 mb-4">Vyberte zamestnancov, ktorí uvidia projekt <b>{projects.find(p => p.id === showAccessModal)?.name}</b> vo svojom centre.</p>
                        <div className="max-h-72 overflow-y-auto border border-gray-200 rounded p-2 bg-white">
                          {departments.map(dept => {
                            const deptUsers = globalUsers.filter(u => u.deptId === dept.id);
                            if (deptUsers.length === 0) return null;
                            return (
                              <div key={dept.id} className="mb-3 last:mb-0 bg-gray-50/50 p-2 rounded border border-gray-100">
                                <div className="text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 px-1 border-b border-gray-200 pb-1">{dept.prefix} {dept.name}</div>
                                <div className="space-y-1">
                                  {deptUsers.map(u => {
                                    const proj = projects.find(p => p.id === showAccessModal);
                                    const allowed = proj?.allowedUsers || [];
                                    const isChecked = allowed.includes(u.id);
                                    return (
                                      <label key={u.id} className="flex items-center gap-2 p-1.5 hover:bg-blue-50 rounded cursor-pointer ml-1 transition-colors border-l-2 border-transparent hover:border-blue-300">
                                        <input type="checkbox" checked={isChecked} onChange={(e) => {
                                          const newList = e.target.checked ? [...allowed, u.id] : allowed.filter(id => id !== u.id);
                                          setAppState(prev => ({...prev, projects: prev.projects.map(p => p.id === showAccessModal ? {...p, allowedUsers: newList} : p)}));

                          <tr>
                            <th className="p-3 w-8"></th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-16">Sekcia</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-64">Názov úlohy</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-36">Začiatok</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-36">Termín</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-40">Zodpovedný</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-36">Stav</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Poznámka</th>
                            <th className="p-3 w-10"></th>
                          </tr>
                        </thead>
                        <tbody>
                          {tasks.map((task, index) => {
                            const currentTopLevel = task.wbs ? String(task.wbs).split('.')[0] : '';
                            const prevTopLevel = index > 0 && tasks[index - 1].wbs ? String(tasks[index - 1].wbs).split('.')[0] : currentTopLevel;
                            const isNewSection = index > 0 && currentTopLevel !== prevTopLevel && currentTopLevel !== '';
                            const tdBorder = isNewSection ? 'border-t-[3px] border-t-gray-600' : 'border-t border-t-gray-200';
                            const depth = task.wbs ? String(task.wbs).split('.').filter(Boolean).length : 0;
                            return (
                            <tr key={task.id} className={`hover:bg-blue-50/30 transition-colors group ${draggedTaskIndex === index ? 'opacity-50 bg-blue-100' : ''}`} draggable onDragStart={() => setDraggedTaskIndex(index)} onDragOver={(e) => e.preventDefault()} onDrop={() => {
                              if (draggedTaskIndex === null || draggedTaskIndex === index) return;
                              updateCurrentProject(p => {
                                const newTasks = [...(p.tasks||[])];
                                const [draggedItem] = newTasks.splice(draggedTaskIndex, 1);
                                newTasks.splice(index, 0, draggedItem);
                                return { ...p, tasks: newTasks };
                              });
                              setDraggedTaskIndex(null);
                            }}>
                              <td className={`p-2 border-r border-r-gray-100 text-center cursor-grab active:cursor-grabbing text-gray-300 hover:text-gray-500 ${tdBorder}`}><Icon name="grip-vertical" size={16} /></td>
                              <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><InputCell value={task.wbs} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, wbs: v} : t)}))} placeholder="1.1" /></td>
                              <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><div style={{ paddingLeft: depth > 1 ? `${(depth - 1) * 1.5}rem` : '0' }}><InputCell value={task.name} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, name: v} : t)}))} placeholder="Názov..." /></div></td>
                              <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><InputCell value={task.startDate} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, startDate: v} : t)}))} type="date" /></td>
                              <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><InputCell value={task.deadline} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, deadline: v} : t)}))} type="date" /></td>
                              <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><UserSelect value={task.assignedTo} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, assignedTo: v} : t)}))} users={globalUsers} departments={departments} /></td>
                              <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><StatusSelect value={task.status} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, status: v} : t)}))} /></td>
                              <td className={`p-2 border-r border-r-gray-100 flex items-center gap-1 ${tdBorder}`}><InputCell value={task.notes} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, notes: v} : t)}))} placeholder="Poznámka..." /></td>
                              <td className={`p-2 text-center ${tdBorder}`}><button onClick={() => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).filter(t => t.id !== task.id)}))} className="text-red-400 hover:text-red-600 transition-colors p-1"><Icon name="trash-can" size={16} /></button></td>
                            </tr>
                          )})}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* --- GANTT --- */}
                {activeTab === 'gantt' && (
                  <div className="bg-white rounded-xl shadow border border-gray-200 flex-1 flex flex-col overflow-hidden p-6 print:hidden">
                    <h2 className="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Ganttov diagram</h2>
                    {!ganttData ? (
                      <div className="flex-1 flex items-center justify-center text-gray-500 flex-col gap-2">
                        <Icon name="chart-gantt" size={48} className="text-gray-300" />
                        <p>Pre zobrazenie diagramu musia mať úlohy vyplnený <b>Začiatok</b> aj <b>Termín</b> (platným dátumom).</p>
                      </div>
                    ) : (
                      <div className="flex-1 overflow-auto"><div className="min-w-[800px]">
                          <div className="flex border-b border-gray-300 pb-2 mb-4 relative">
                            <div className="w-1/4 font-semibold text-gray-600 text-sm">Názov úlohy</div>
                            <div className="w-3/4 relative h-6 border-l border-gray-300">
                              <span className="absolute left-0 -translate-x-1/2 text-xs text-gray-500 bg-white px-1">{ganttData.minDate.toLocaleDateString('sk-SK')}</span>
                              <span className="absolute right-0 translate-x-1/2 text-xs text-gray-500 bg-white px-1">{ganttData.maxDate.toLocaleDateString('sk-SK')}</span>
                            </div>
                          </div>
                          <div className="space-y-3">
                            {ganttData.validTasks.map(task => {
                              const tStart = new Date(task.startDate).getTime();
                              const tEnd = new Date(task.deadline).getTime();
                              let leftPercent = ((tStart - ganttData.minDate.getTime()) / ganttData.totalTime) * 100;
                              let widthPercent = ((tEnd - tStart) / ganttData.totalTime) * 100;
                              if (widthPercent <= 0) widthPercent = 1;
                              const statusColor = STATUS_OPTIONS.find(o => o.value === task.status)?.color.split(' ')[0] || 'bg-gray-400';
                              return (
                                <div key={task.id} className="flex items-center group">
                                  <div className="w-1/4 pr-4 truncate text-sm font-medium text-gray-700">{task.wbs} {task.name}</div>
                                  <div className="w-3/4 relative h-8 bg-gray-50 border-l border-gray-200 rounded-r">
                                    <div className={`absolute h-6 top-1 rounded-md shadow-sm flex items-center px-2 text-xs font-medium text-gray-800 ${statusColor}`} style={{ left: `${leftPercent}%`, width: `${widthPercent}%`, minWidth: '24px' }}>
                                      {widthPercent > 5 && <span className="truncate opacity-75">{new Date(task.startDate).toLocaleDateString('sk-SK').slice(0, -5)}</span>}
                                    </div>
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                      </div></div>
                    )}
                  </div>
                )}

                {/* --- MAJETOK --- */}
                {activeTab === 'majetek' && (
                  <div className="bg-white rounded-xl shadow border border-gray-200 flex-1 flex flex-col overflow-hidden print:hidden">
                    <div className="p-4 border-b flex justify-between items-center bg-gray-50/50 print:hidden">
                      <h2 className="text-lg font-semibold text-gray-800">Zošit: Rozpočet a Majetok</h2>
                      <button onClick={() => updateCurrentProject(p => ({...p, assets: [...(p.assets||[]), { id: Date.now().toString(), name: '', quantity: 1, unitPrice: 0, assignedTo: '', status: '1' }] }))} className="flex items-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md text-sm font-medium transition-colors"><Icon name="plus" size={16} /> Pridať položku</button>
                    </div>
                    <div className="overflow-auto flex-1">
                      <table className="w-full text-left border-collapse min-w-max">
                        <thead className="sticky top-0 bg-gray-100 border-b border-gray-300 z-10 shadow-sm">
                          <tr>
                            <th className="p-3 w-8"></th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Názov položky</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-24 text-right">Počet</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-32 text-right">Cena / kus (€)</th>
                            <th className="p-3 text-xs font-semibold text-gray-800 uppercase tracking-wider w-36 text-right bg-gray-200/50">Cena celkom</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-48">Zodpovedná osoba</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-40">Stav</th>
                            <th className="p-3 w-10"></th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {assets.map((asset, index) => {
                            const rowTotal = Number(asset.quantity) * Number(asset.unitPrice);
                            return (
                              <tr key={asset.id} className="hover:bg-blue-50/30 transition-colors group">
                                <td className="p-2 border-r border-gray-100 text-center text-gray-300"><Icon name="grip-vertical" size={16} /></td>
                                <td className="p-2 border-r border-gray-100"><InputCell value={asset.name} onChange={(v) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, name: v} : a)}))} placeholder="Názov majetku..." /></td>
                                <td className="p-2 border-r border-gray-100"><input type="number" value={asset.quantity} onChange={(e) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, quantity: e.target.value} : a)}))} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 text-right" min="0" /></td>
                                <td className="p-2 border-r border-gray-100"><input type="number" value={asset.unitPrice} onChange={(e) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, unitPrice: e.target.value} : a)}))} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 text-right" min="0" /></td>
                                <td className="p-2 border-r border-gray-100 text-right font-medium text-gray-800 bg-gray-50/30">{rowTotal.toLocaleString('sk-SK')} €</td>
                                <td className="p-2 border-r border-gray-100"><UserSelect value={asset.assignedTo} onChange={(v) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, assignedTo: v} : a)}))} users={globalUsers} departments={departments} /></td>
                                <td className="p-2 border-r border-gray-100"><StatusSelect value={asset.status} onChange={(v) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, status: v} : a)}))} /></td>
                                <td className="p-2 text-center"><button onClick={() => updateCurrentProject(p => ({...p, assets: (p.assets||[]).filter(a => a.id !== asset.id)}))} className="text-red-400 hover:text-red-600 transition-colors p-1"><Icon name="trash-can" size={16} /></button></td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot className="sticky bottom-0 bg-gray-100 border-t-2 border-gray-300">
                          <tr>
                            <td colSpan="4" className="p-4 text-right font-bold text-gray-700">CELKOVÉ NÁKLADY:</td>
                            <td className="p-4 text-right font-bold text-xl text-blue-700 whitespace-nowrap">{totalAssetsCost.toLocaleString('sk-SK')} €</td>
                            <td colSpan="3"></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                )}

                {/* --- KONTAKTY --- */}
                {activeTab === 'kontakty' && (
                  <div className="bg-white rounded-xl shadow border border-gray-200 flex-1 flex flex-col overflow-hidden print:hidden">
                    <div className="p-4 border-b flex justify-between items-center bg-gray-50/50">
                      <h2 className="text-lg font-semibold text-gray-800">Zošit: Adresár kontaktov</h2>
                      <button onClick={() => updateCurrentProject(p => ({...p, contacts: [...(p.contacts||[]), { id: Date.now().toString(), name: '', position: '', email: '', phone: '' }] }))} className="flex items-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md text-sm font-medium transition-colors"><Icon name="plus" size={16} /> Pridať kontakt</button>
                    </div>
                    <div className="overflow-auto flex-1">
                      <table className="w-full text-left border-collapse min-w-max">
                        <thead className="sticky top-0 bg-gray-100 border-b border-gray-300 z-10 shadow-sm">
                          <tr>
                            <th className="p-3 w-8"></th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Meno a priezvisko</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-64">Pozícia</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-64">E-mail</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-48">Tel. číslo</th>
                            <th className="p-3 w-10"></th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {contacts.map((contact, index) => (
                            <tr key={contact.id} className="hover:bg-blue-50/30 transition-colors group">
                              <td className="p-2 border-r border-gray-100 text-center text-gray-300"><Icon name="grip-vertical" size={16} /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.name} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, name: v} : c)}))} placeholder="Napr. Ján Novák" /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.position} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, position: v} : c)}))} placeholder="Napr. Manažér pobočky" /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.email} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, email: v} : c)}))} type="email" placeholder="jan@firma.sk" /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.phone} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, phone: v} : c)}))} type="tel" placeholder="+421..." /></td>
                              <td className="p-2 text-center"><button onClick={() => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).filter(c => c.id !== contact.id)}))} className="text-red-400 hover:text-red-600 transition-colors p-1"><Icon name="trash-can" size={16} /></button></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}

                {/* ========================================================= */}
                {/* --- BEŽNÝ PDF NÁHĽAD (TLAČÍ SA IBA CEZ "Export PDF") --- */}
                {/* ========================================================= */}
                <div className="hidden print:block flex-1 overflow-visible print-report-only">
                  <div className="max-w-[210mm] mx-auto bg-white min-h-[297mm] p-0 w-full">
                    <div className="flex justify-between items-end border-b-2 border-gray-800 pb-4 mb-8">
                      <img src={LOGO_URL} alt="Logo" className="h-14 object-contain" />
                      <div className="text-right">
                        <h1 className="text-2xl font-bold text-gray-900 leading-tight">{currentProject.name}</h1>
                        <p className="text-sm text-gray-500 mt-1">Stav k dátumu: {new Date().toLocaleDateString('sk-SK')}</p>
                      </div>
                    </div>
                    
                    {/* Iba Harmonogram */}
                    <div className="mb-10">
                      <h2 className="text-lg font-bold text-gray-800 mb-4 uppercase tracking-wide">Harmonogram úloh</h2>
                      <table className="w-full text-left border-collapse text-sm">
                        <thead>
                          <tr className="border-b-2 border-gray-800">
                            <th className="py-2 pr-2 font-bold text-gray-800 w-12">WBS</th>
                            <th className="py-2 pr-2 font-bold text-gray-800">Názov úlohy</th>
                            <th className="py-2 pr-2 font-bold text-gray-800 w-24">Začiatok</th>
                            <th className="py-2 pr-2 font-bold text-gray-800 w-24">Termín</th>
                            <th className="py-2 pr-2 font-bold text-gray-800 w-32">Zodpovednosť</th>
                            <th className="py-2 font-bold text-gray-800 w-32">Stav</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {tasks.map((task) => {
                            const statusLabel = STATUS_OPTIONS.find(o => o.value === task.status)?.label || '-';
                            const userName = globalUsers.find(u => u.id === task.assignedTo)?.name || '-';
                            const depth = task.wbs ? String(task.wbs).split('.').filter(Boolean).length : 0;
                            return (
                              <tr key={task.id} className="break-inside-avoid">
                                <td className="py-2 pr-2 text-gray-600 align-top">{task.wbs}</td>
                                <td className="py-2 pr-2 text-gray-900 font-medium align-top"><div style={{ paddingLeft: depth > 1 ? `${(depth - 1) * 1.5}rem` : '0' }}>{task.name}{task.notes && <div className="text-xs text-gray-500 font-normal mt-0.5">{task.notes}</div>}</div></td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{task.startDate ? new Date(task.startDate).toLocaleDateString('sk-SK') : '-'}</td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{task.deadline ? new Date(task.deadline).toLocaleDateString('sk-SK') : '-'}</td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{userName}</td>
                                <td className="py-2 text-gray-700 align-top">{statusLabel}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>

                {/* ========================================================= */}
                {/* --- GANTT PDF NÁHĽAD (TLAČÍ SA IBA CEZ "Export Gantt") --- */}
                {/* ========================================================= */}
                <div className="hidden print:block flex-1 overflow-visible print-gantt-only w-[297mm]">
                  <div className="flex justify-between items-end border-b-2 border-gray-800 pb-4 mb-6">
                    <img src={LOGO_URL} alt="Logo" className="h-10 object-contain" />
                    <div className="text-right">
                      <h1 className="text-xl font-bold text-gray-900 leading-tight">{currentProject.name} (Ganttov diagram)</h1>
                      <p className="text-xs text-gray-500 mt-1">Stav k dátumu: {new Date().toLocaleDateString('sk-SK')}</p>
                    </div>
                  </div>

                  {!ganttData ? (
                    <div className="text-center text-gray-500 py-10 italic">Pre zobrazenie diagramu musia mať úlohy vyplnený Začiatok aj Termín.</div>
                  ) : (
                    <div>
                      <div className="flex border-b border-gray-300 pb-2 mb-4 relative">
                        <div className="w-1/3 font-bold text-gray-800 text-sm">Názov úlohy</div>
                        <div className="w-2/3 relative h-4 border-l border-gray-300">
                          <span className="absolute left-0 -translate-x-1/2 text-[10px] text-gray-600 bg-white px-1 font-bold">{ganttData.minDate.toLocaleDateString('sk-SK')}</span>
                          <span className="absolute right-0 translate-x-1/2 text-[10px] text-gray-600 bg-white px-1 font-bold">{ganttData.maxDate.toLocaleDateString('sk-SK')}</span>
                        </div>
                      </div>
                      <div className="space-y-2">
                        {ganttData.validTasks.map(task => {
                          const tStart = new Date(task.startDate).getTime();
                          const tEnd = new Date(task.deadline).getTime();
                          let leftPercent = ((tStart - ganttData.minDate.getTime()) / ganttData.totalTime) * 100;
                          let widthPercent = ((tEnd - tStart) / ganttData.totalTime) * 100;
                          if (widthPercent <= 0) widthPercent = 1;
                          const statusColor = STATUS_OPTIONS.find(o => o.value === task.status)?.color.split(' ')[0] || 'bg-gray-400';
                          return (
                            <div key={task.id} className="flex items-center group page-break-inside-avoid">
                              <div className="w-1/3 pr-4 truncate text-xs font-medium text-gray-800 border-r border-gray-200">{task.wbs} {task.name}</div>
                              <div className="w-2/3 relative h-6">
                                <div className={`absolute h-4 top-1 rounded flex items-center px-1 text-[9px] font-medium text-gray-900 ${statusColor} print:!bg-opacity-100`} style={{ left: `${leftPercent}%`, width: `${widthPercent}%`, minWidth: '16px', WebkitPrintColorAdjust: 'exact' }}>
                                  {widthPercent > 8 && <span className="truncate opacity-80">{new Date(task.startDate).toLocaleDateString('sk-SK').slice(0, -5)} - {new Date(task.deadline).toLocaleDateString('sk-SK').slice(0, -5)}</span>}
                                </div>
                              </div>
                            </div>
                          )
                        })}
                      </div>
                    </div>
                  )}
                </div>

              </main>

              {/* SPODNÁ LIŠTA EDITOR - IDENTIFIKÁTOR A ODHLÁSENIE */}
              <div className="fixed bottom-0 left-0 w-full bg-gray-900 text-white p-2 px-6 text-xs flex justify-between items-center z-40 print:hidden shadow-lg">
                 <div className="flex items-center gap-4">
                   <span className="flex items-center gap-2">
                     <img src={user?.photoURL || 'https://via.placeholder.com/30'} alt="Avatar" className="w-6 h-6 rounded-full border border-gray-600"/>
                     <span>{user?.displayName} ({user?.email})</span>
                   </span>
                 </div>
                 <div className="flex items-center gap-4">
                   {isAdmin && <div className="text-gray-400 border-r border-gray-700 pr-4 mr-1">{APP_VERSION}</div>}
                   <button onClick={handleLogout} className="bg-gray-800 hover:bg-red-600 px-3 py-1 rounded transition-colors text-white border border-gray-700 hover:border-red-500">Odhlásiť sa</button>
                 </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
