<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projektové centrum (G4S)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome (Ikony) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PDF Knižnice pre priame stiahnutie -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Skrytý kontajner pre generovanie PDF - nie je ho vidieť na obrazovke, ale knižnica ho dokáže odfotiť */
        .pdf-export-hidden {
            position: absolute;
            top: -9999px;
            left: -9999px;
            background-color: white;
            z-index: -10;
        }
        .pdf-export-hidden.gantt-mode {
            width: 297mm;
        }
        .pdf-export-hidden.report-mode {
            width: 210mm;
        }
        
        @media print {
            body { -webkit-print-color-adjust: exact; print-color-adjust: exact; background-color: white !important; }
            .print\:hidden { display: none !important; }
            @page { margin: 0; size: auto; }
        }
        
        /* Zlepšený scrollbar pre tabuľky */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // --- VERZIA APLIKÁCIE ---
        const APP_VERSION = "Verzia: 14.03.2026, 15:50 (Zodpovedná osoba - výber)";

        // ==========================================
        // VÁŠ FIREBASE KĽÚČ
        // ==========================================
        const myFirebaseConfig = {
          apiKey: "AIzaSyBLFs7Bl87JY1IzrpG3ikcaOIo5b8LHY5g",
          authDomain: "g4s-projektove-centrum.firebaseapp.com",
          projectId: "g4s-projektove-centrum",
          storageBucket: "g4s-projektove-centrum.firebasestorage.app",
          messagingSenderId: "352515331262",
          appId: "1:352515331262:web:4785b14e05bbf8b7d47aef"
        };

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'g4s-tracker';
        const app = initializeApp(myFirebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // ==========================================

        const Icon = ({ name, size = 16, className = "" }) => (
            <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: size }}></i>
        );

        const STATUS_OPTIONS = [
          { value: '1', label: '1. Nevyriešené', color: 'bg-red-100 text-red-800' },
          { value: '2', label: '2. V riešení', color: 'bg-blue-100 text-blue-800' },
          { value: '3', label: '3. Vyriešené', color: 'bg-green-100 text-green-800' },
        ];

        const LOGO_URL = "image_1e7ca9.png"; 

        const StatusSelect = ({ value, onChange }) => (
          <select value={value} onChange={e => onChange(e.target.value)} className={`w-full p-1 rounded outline-none border-transparent focus:border-blue-500 focus:ring-1 focus:ring-blue-500 ${STATUS_OPTIONS.find(o => o.value === value)?.color || 'bg-white'}`}>
            {STATUS_OPTIONS.map(opt => <option key={opt.value} value={opt.value} className="bg-white text-gray-900">{opt.label}</option>)}
          </select>
        );

        // --- KOMPONENT: Výber jednej osoby v roletke (napr. na zodpovednú osobu za projekt) ---
        const UserSelect = ({ value, onChange, users, departments }) => (
          <select value={value || ''} onChange={e => onChange(e.target.value)} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500">
            <option value="">-- Nepriradené --</option>
            {departments.map(dept => (
              <optgroup key={dept.id} label={`${dept.prefix} ${dept.name}`}>
                {users.filter(u => u.deptId === dept.id).map(u => (
                  <option key={u.id} value={u.id}>{u.prefix} {u.name}</option>
                ))}
              </optgroup>
            ))}
          </select>
        );

        // --- KOMPONENT: Výber viacerých osôb v tabuľke úloh ---
        const MultiUserSelect = ({ value, onChange, users, departments }) => {
            const [open, setOpen] = useState(false);
            
            const valArray = Array.isArray(value) ? value : (value ? [value] : []);
            
            const selectedNames = valArray.map(id => {
                const u = users.find(user => user.id === id);
                return u ? u.name : null;
            }).filter(Boolean).join(', ');

            return (
                <div className="relative">
                    <div onClick={() => setOpen(!open)} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 cursor-pointer text-sm truncate min-h-[28px] flex items-center border border-transparent hover:border-gray-200">
                        {selectedNames || <span className="text-gray-400 italic">-- Nepriradené --</span>}
                    </div>
                    
                    {open && <div className="fixed inset-0 z-40" onClick={() => setOpen(false)}></div>}
                    
                    {open && (
                        <div className="absolute z-50 mt-1 w-64 bg-white border border-gray-200 shadow-xl rounded-md max-h-64 overflow-y-auto left-0">
                            {departments.map(dept => {
                                const deptUsers = users.filter(u => u.deptId === dept.id);
                                if (!deptUsers.length) return null;
                                return (
                                    <div key={dept.id} className="p-2 border-b border-gray-100 last:border-0">
                                        <div className="text-xs font-bold text-gray-400 mb-1 uppercase tracking-wider">{dept.prefix} {dept.name}</div>
                                        {deptUsers.map(u => {
                                            const isChecked = valArray.includes(u.id);
                                            return (
                                                <label key={u.id} className="flex items-center gap-2 p-1.5 hover:bg-blue-50 cursor-pointer rounded transition-colors">
                                                    <input 
                                                        type="checkbox" 
                                                        checked={isChecked} 
                                                        onChange={(e) => {
                                                            if (e.target.checked) onChange([...valArray, u.id]);
                                                            else onChange(valArray.filter(id => id !== u.id));
                                                        }} 
                                                        className="rounded text-blue-600 w-4 h-4"
                                                    />
                                                    <span className="text-sm text-gray-700 flex flex-col">
                                                        <span>{u.prefix} {u.name}</span>
                                                        {u.position && <span className="text-[10px] text-gray-400 leading-none">{u.position}</span>}
                                                    </span>
                                                </label>
                                            );
                                        })}
                                    </div>
                                );
                            })}
                            {users.length === 0 && <div className="text-sm text-gray-500 p-3 italic">Žiadni používatelia v systéme.</div>}
                        </div>
                    )}
                </div>
            );
        };

        const InputCell = ({ value, onChange, type = "text", placeholder = "", className="" }) => (
          <input type={type} value={value || ''} onChange={e => onChange(e.target.value)} placeholder={placeholder} className={`w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 border border-transparent hover:border-gray-200 ${className}`} />
        );

        // --- EXPORT KOMPONENTY ---
        const ExportTasks = ({ tasks, globalUsers }) => (
            <table className="w-full text-left border-collapse text-sm mb-10">
                <thead>
                    <tr className="border-b-2 border-gray-800">
                        <th className="py-2 pr-2 font-bold text-gray-800 w-12">WBS</th>
                        <th className="py-2 pr-2 font-bold text-gray-800">Názov úlohy</th>
                        <th className="py-2 pr-2 font-bold text-gray-800 w-24">Začiatok</th>
                        <th className="py-2 pr-2 font-bold text-gray-800 w-24">Termín</th>
                        <th className="py-2 pr-2 font-bold text-gray-800 w-32">Zodpovednosť</th>
                        <th className="py-2 pr-2 font-bold text-gray-800 w-24">Stav</th>
                        <th className="py-2 font-bold text-gray-800 w-32">Pozn. / Odkaz</th>
                    </tr>
                </thead>
                <tbody className="divide-y divide-gray-200">
                    {tasks.map(task => {
                        const statusLabel = STATUS_OPTIONS.find(o => o.value === task.status)?.label || '-';
                        // Zlúčenie viacerých mien pre export
                        const valArray = Array.isArray(task.assignedTo) ? task.assignedTo : (task.assignedTo ? [task.assignedTo] : []);
                        const userName = valArray.map(id => globalUsers.find(u => u.id === id)?.name).filter(Boolean).join(', ') || '-';
                        
                        const depth = task.wbs ? String(task.wbs).split('.').filter(Boolean).length : 0;
                        return (
                            <tr key={task.id}>
                                <td className="py-2 pr-2 text-gray-600 align-top">{task.wbs}</td>
                                <td className="py-2 pr-2 text-gray-900 font-medium align-top">
                                    <div style={{ paddingLeft: depth > 1 ? `${(depth - 1) * 1.5}rem` : '0' }}>{task.name}</div>
                                </td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{task.startDate ? new Date(task.startDate).toLocaleDateString('sk-SK') : '-'}</td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{task.deadline ? new Date(task.deadline).toLocaleDateString('sk-SK') : '-'}</td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{userName}</td>
                                <td className="py-2 pr-2 text-gray-700 align-top">{statusLabel}</td>
                                <td className="py-2 text-gray-700 align-top">
                                    {task.notes && <div className="text-xs mb-1">{task.notes}</div>}
                                    {task.link && <div className="text-xs text-blue-600 break-all">{task.link}</div>}
                                </td>
                            </tr>
                        );
                    })}
                </tbody>
            </table>
        );

        // --- GANTT RENDERER S TÝŽDŇOVOU MRIEŽKOU ---
        const ExportGantt = ({ ganttData }) => {
            if (!ganttData) return <div className="text-center text-gray-500 py-10 italic">Pre zobrazenie diagramu musia mať úlohy vyplnený Začiatok aj Termín.</div>;
            
            // Generovanie týždňov (Pondelky)
            const weeks = [];
            let currDate = new Date(ganttData.minDate);
            // Nájsť prvý pondelok po alebo presne v minDate
            let dayOfWeek = currDate.getDay();
            let diffToMonday = currDate.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            let firstMonday = new Date(currDate.setDate(diffToMonday));
            firstMonday.setHours(0,0,0,0);
            
            // Ak je prvý pondelok PRED minDate, posunieme sa o týždeň
            if (firstMonday < ganttData.minDate) {
                firstMonday.setDate(firstMonday.getDate() + 7);
            }

            while (firstMonday <= ganttData.maxDate) {
                weeks.push(new Date(firstMonday));
                firstMonday.setDate(firstMonday.getDate() + 7);
            }

            return (
                <div className="mt-8 pt-6 relative">
                    <div className="flex border-b-2 border-gray-400 pb-2 mb-4 relative z-20 bg-white/80">
                        <div className="w-1/4 font-bold text-gray-800 text-sm">Názov úlohy</div>
                        <div className="w-3/4 relative h-6 border-l-2 border-gray-400">
                            {/* Týždňové štítky v hlavičke */}
                            {weeks.map(w => {
                                const lp = ((w.getTime() - ganttData.minDate.getTime()) / ganttData.totalTime) * 100;
                                return (
                                    <div key={w.getTime()} className="absolute top-0 bottom-0" style={{ left: `${lp}%` }}>
                                        <span className="absolute -top-6 -translate-x-1/2 text-[10px] text-gray-600 font-bold bg-white px-1 whitespace-nowrap">
                                            {w.toLocaleDateString('sk-SK', {day: 'numeric', month: 'numeric'})}
                                        </span>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                    
                    <div className="relative">
                        {/* Zvislé čiary pre týždne (pozadie) */}
                        <div className="absolute inset-0 z-0">
                             <div className="w-1/4 h-full float-left border-r border-gray-200"></div>
                             <div className="w-3/4 h-full float-left relative">
                                 {weeks.map(w => {
                                    const lp = ((w.getTime() - ganttData.minDate.getTime()) / ganttData.totalTime) * 100;
                                    return <div key={w.getTime()} className="absolute top-0 bottom-0 border-l border-dashed border-gray-300" style={{ left: `${lp}%` }}></div>
                                 })}
                             </div>
                        </div>

                        {/* Úlohy (V popredí) */}
                        <div className="space-y-3 relative z-10">
                            {ganttData.validTasks.map(task => {
                                const tStart = new Date(task.startDate).getTime();
                                const tEnd = new Date(task.deadline).getTime();
                                let leftPercent = ((tStart - ganttData.minDate.getTime()) / ganttData.totalTime) * 100;
                                let widthPercent = ((tEnd - tStart) / ganttData.totalTime) * 100;
                                if (widthPercent <= 0) widthPercent = 1;
                                const statusColor = STATUS_OPTIONS.find(o => o.value === task.status)?.color.split(' ')[0] || 'bg-gray-400';
                                return (
                                    <div key={task.id} className="flex items-center group page-break-inside-avoid relative">
                                        <div className="w-1/4 pr-4 truncate text-xs font-medium text-gray-800 bg-white/90">{task.wbs} {task.name}</div>
                                        <div className="w-3/4 relative h-6">
                                            <div className={`absolute h-5 top-0.5 rounded shadow-sm flex items-center px-1 text-[9px] font-medium text-gray-900 ${statusColor} print:!bg-opacity-100 border border-gray-300/20`} style={{ left: `${leftPercent}%`, width: `${widthPercent}%`, minWidth: '16px' }}>
                                                {widthPercent > 6 && <span className="truncate opacity-90">{new Date(task.startDate).toLocaleDateString('sk-SK').slice(0, -5)} - {new Date(task.deadline).toLocaleDateString('sk-SK').slice(0, -5)}</span>}
                                            </div>
                                        </div>
                                    </div>
                                )
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const INITIAL_DB_STATE = {
          admins: [], 
          departments: [
            { id: 'd1', prefix: '1.', name: 'ĽZ/nábor' },
            { id: 'd2', prefix: '2.', name: 'Ostraha' }
          ],
          globalUsers: [
            { id: 'u1', deptId: 'd1', prefix: '1.1.', name: 'Lenka A.', email: 'lenka@firma.sk', position: 'HR Manažér', notifyDays: 3 },
            { id: 'u2', deptId: 'd1', prefix: '1.2.', name: 'Pavel K.', email: 'pavel@firma.sk', position: 'Asistent', notifyDays: 1 },
            { id: 'u3', deptId: 'd2', prefix: '2.1.', name: 'Ján Novák', email: 'jan.novak@firma.sk', position: 'Špecialista BOZP', notifyDays: 3 },
          ],
          projects: [
            {
              id: 'p1', name: 'Projekt: Rekonštrukcia pobočky', isTemplate: false, lastModified: new Date().toLocaleDateString('sk-SK'),
              startDate: '2026-02-01', endDate: '2026-05-01',
              projectManagerId: 'u1',
              allowedUsers: ['u3', 'u1'],
              contacts: [{ id: 'c1', name: 'Karol Zima', position: 'Manažér pobočky', email: 'karol.zima@firma.sk', phone: '+421 900 123 456' }],
              tasks: [
                { id: 't1', wbs: '1.', name: 'BOZP', link: '', startDate: '', deadline: '', assignedTo: ['u3'], status: '1', notes: 'Zabezpečiť úvodné školenie' }
              ],
              assets: [{ id: 'a1', name: 'Ochranné prilby', quantity: 15, unitPrice: 450, assignedTo: ['u3'], status: '3' }]
            }
          ]
        };

        function App() {
          const [user, setUser] = useState(null);
          const [authLoading, setAuthLoading] = useState(true);
          const [appState, setAppState] = useState(null);
          const [loading, setLoading] = useState(true);
          const [dbError, setDbError] = useState(false);

          // Stav pre indikátor sťahovania PDF
          const [isExporting, setIsExporting] = useState(null);

          const [activeTab, setActiveTab] = useState('harmonogram');
          const [dashboardTab, setDashboardTab] = useState('projects');

          const [draggedTaskIndex, setDraggedTaskIndex] = useState(null);
          const [draggedAssetIndex, setDraggedAssetIndex] = useState(null);
          const [draggedContactIndex, setDraggedContactIndex] = useState(null);

          const [showNewProjectModal, setShowNewProjectModal] = useState(false);
          const [newProjectName, setNewProjectName] = useState('');
          const [selectedTemplateId, setSelectedTemplateId] = useState('');
          const [newProjectAllowedUsers, setNewProjectAllowedUsers] = useState([]); 
          
          const [showAccessModal, setShowAccessModal] = useState(null); 

          const [activeProjectId, setActiveProjectId] = useState(null);
          const [newAdminUid, setNewAdminUid] = useState('');

          useEffect(() => {
            const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
              setUser(currentUser);
              setAuthLoading(false);
            });
            return () => unsubscribe();
          }, []);

          useEffect(() => {
            if (!user) return;
            const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            const unsubscribe = onSnapshot(stateRef, (docSnap) => {
              if (docSnap.exists()) {
                setAppState(docSnap.data());
                setLoading(false);
              } else {
                const defaultDb = { ...INITIAL_DB_STATE, admins: [user.uid] };
                setDoc(stateRef, defaultDb);
              }
            }, (error) => {
              console.error("Firestore sync error:", error);
              setDbError(true);
            });
            return () => unsubscribe();
          }, [user]);

          // Prihlasovanie
          const handleLogin = async () => {
            try {
              await signInWithPopup(auth, googleProvider);
            } catch (error) {
              console.error("Chyba pri prihlásení:", error);
              alert("Nepodarilo sa prihlásiť. Skúste to prosím znova.");
            }
          };

          const handleLogout = () => signOut(auth);

          const updateCloudState = async (updates) => {
            if (!user || !appState) return;
            setAppState(prev => ({ ...prev, ...updates }));
            const stateRef = doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main');
            try { await setDoc(stateRef, { ...appState, ...updates }, { merge: true }); } 
            catch (e) { console.error("Error saving to cloud:", e); }
          };

          // --- PRIAMY EXPORT DO PDF CEZ JSPDF ---
          const exportToPDF = (type) => {
            setIsExporting(type);
            
            setTimeout(async () => {
              try {
                const { jsPDF } = window.jspdf;
                const elementId = type === 'gantt' ? 'gantt-export-container' : 'report-export-container';
                const element = document.getElementById(elementId);
                
                if (!element) throw new Error("Element nenájdený");

                const canvas = await window.html2canvas(element, { 
                    scale: 2, 
                    useCORS: true,
                    logging: false,
                    backgroundColor: '#ffffff',
                    windowWidth: type === 'gantt' ? 1122 : 794
                });
                
                const imgData = canvas.toDataURL('image/jpeg', 1.0);
                const isGantt = type === 'gantt';
                
                const pdf = new jsPDF({
                    orientation: isGantt ? 'landscape' : 'portrait',
                    unit: 'mm',
                    format: 'a4'
                });
                
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
                
                pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
                
                const projectNameClean = currentProject?.name?.replace(/[^a-zA-Z0-9]/g, '_') || 'Projekt';
                pdf.save(`G4S_${projectNameClean}_${isGantt ? 'Gantt' : 'Harmonogram'}.pdf`);
                
              } catch (err) {
                console.error('Chyba pri exporte:', err);
                alert('Nepodarilo sa vygenerovať PDF. Skúste to prosím znova.');
              } finally {
                setIsExporting(null);
              }
            }, 300);
          };

          if (authLoading) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
                <Icon name="circle-notch" className="fa-spin text-blue-600 mb-4" size={40} />
                <p className="text-gray-500 font-medium">Overovanie prístupu...</p>
              </div>
            );
          }

          if (!user) {
            return (
              <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
                <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border border-gray-200 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
                  <img src={LOGO_URL} alt="Logo" className="h-16 object-contain mx-auto mb-6" />
                  <h1 className="text-2xl font-bold text-gray-800 mb-2">Projektové centrum</h1>
                  <p className="text-gray-500 mb-8 text-sm">Pre prístup k harmonogramom a projektom je potrebné sa prihlásiť vaším pracovným účtom.</p>
                  
                  <button onClick={handleLogin} className="w-full flex items-center justify-center gap-3 bg-white border-2 border-gray-200 hover:border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-3 px-4 rounded-lg transition-colors shadow-sm">
                    <Icon name="google" className="text-red-500 fa-brands" size={18} />
                    Prihlásiť sa cez Google
                  </button>
                  
                  <div className="mt-8 flex items-center justify-center gap-2 text-xs text-gray-400">
                    <Icon name="lock" size={12} /> Zabezpečené prostredie G4S
                  </div>
                </div>
              </div>
            );
          }

          if (dbError) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-6 text-center">
                <Icon name="ban" size={64} className="text-red-400 mb-4" />
                <h1 className="text-2xl font-bold text-gray-800 mb-2">Chyba pripojenia k databáze</h1>
                <p className="text-gray-600 max-w-md">Skontrolujte pripojenie na internet alebo kontaktujte správcu.</p>
                <button onClick={handleLogout} className="mt-6 text-blue-600 underline">Odhlásiť sa</button>
              </div>
            );
          }

          if (loading || !appState) {
            return (
              <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center">
                <Icon name="circle-notch" className="fa-spin text-blue-600 mb-4" size={40} />
                <p className="text-gray-500 font-medium animate-pulse">Sťahovanie projektov zo servera...</p>
              </div>
            );
          }

          const contacts = currentProject.contacts || [];

          const validTasks = tasks.filter(t => {
            if (!t.startDate || !t.deadline) return false;
            const s = new Date(t.startDate).getTime();
            const d = new Date(t.deadline).getTime();
            return !isNaN(s) && !isNaN(d);
          });
          
          if (validTasks.length > 0) {
            const dates = validTasks.flatMap(t => [new Date(t.startDate).getTime(), new Date(t.deadline).getTime()]);
            const minDate = new Date(Math.min(...dates));
            const maxDate = new Date(Math.max(...dates));
            minDate.setDate(minDate.getDate() - 5); 
            maxDate.setDate(maxDate.getDate() + 5);
            const totalTime = maxDate.getTime() - minDate.getTime();
            ganttData = { validTasks, minDate, maxDate, totalTime, totalDays: totalTime / (1000 * 3600 * 24) };
          }

          const totalAssetsCost = assets.reduce((sum, item) => sum + (Number(item.quantity || 0) * Number(item.unitPrice || 0)), 0);

          // --- KOMPONENT PRE VYKRESLENIE TÍMU PROJEKTU ---
          const ProjectTeamSection = ({ isExport = false }) => {

                          {isExport ? (
                              <div className="text-lg font-bold text-blue-900 flex items-center gap-2 mt-1">
                                  <Icon name="user-tie" />
                                  {pm ? `${pm.name} ${pm.position ? `(${pm.position})` : ''}` : 'Nenastavené'}
                              </div>

                              <div className="flex items-center gap-2">
                                  <Icon name="user-tie" className="text-blue-900" />

                </div>

              <main className="flex-1 p-6 overflow-hidden flex flex-col print:p-0 print:overflow-visible bg-gray-100 print:bg-white">
                
                {/* --- HARMONOGRAM --- */}

                      </div>
                      <div className="overflow-auto flex-1">
                        <table className="w-full text-left border-collapse min-w-max">

                              const isNewSection = index > 0 && currentTopLevel !== prevTopLevel && currentTopLevel !== '';
                              const tdBorder = isNewSection ? 'border-t-[3px] border-t-gray-600' : 'border-t border-t-gray-200';
                              const depth = task.wbs ? String(task.wbs).split('.').filter(Boolean).length : 0;
                              return (
                              <tr key={task.id} className={`hover:bg-blue-50/30 transition-colors group ${draggedTaskIndex === index ? 'opacity-50 bg-blue-100' : ''}`} draggable onDragStart={() => setDraggedTaskIndex(index)} onDragOver={(e) => e.preventDefault()} onDrop={() => {
                                if (draggedTaskIndex === null || draggedTaskIndex === index) return;
                                updateCurrentProject(p => {
                                  const newTasks = [...(p.tasks||[])];
                                  const [draggedItem] = newTasks.splice(draggedTaskIndex, 1);
                                  newTasks.splice(index, 0, draggedItem);
                                  return { ...p, tasks: newTasks };
                                });
                                setDraggedTaskIndex(null);
                              }}>
                                <td className={`p-2 border-r border-r-gray-100 text-center cursor-grab active:cursor-grabbing text-gray-300 hover:text-gray-500 ${tdBorder}`}><Icon name="grip-vertical" size={16} /></td>
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><InputCell value={task.wbs} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, wbs: v} : t)}))} placeholder="1.1" /></td>
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><div style={{ paddingLeft: depth > 1 ? `${(depth - 1) * 1.5}rem` : '0' }}><InputCell value={task.name} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, name: v} : t)}))} placeholder="Názov..." /></div></td>
                                
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><InputCell value={task.startDate} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, startDate: v} : t)}))} type="date" /></td>
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder}`}><InputCell value={task.deadline} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, deadline: v} : t)}))} type="date" /></td>
                                
                                {/* Výber viacerých osôb v tabuľke */}
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder} align-top`}>
                                  <MultiUserSelect value={task.assignedTo} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, assignedTo: v} : t)}))} users={globalUsers} departments={departments} />
                                </td>
                                
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder} align-top`}><StatusSelect value={task.status} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, status: v} : t)}))} /></td>
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder} align-top`}><InputCell value={task.notes} onChange={(v) => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).map(t => t.id === task.id ? {...t, notes: v} : t)}))} placeholder="Poznámka..." /></td>
                                
                                {/* ODKAZ */}
                                <td className={`p-2 border-r border-r-gray-100 ${tdBorder} align-top`}>
                                  <div className="flex items-center gap-1">

                                    {task.link && (
                                      <a href={task.link.startsWith('http') ? task.link : `https://${task.link}`} target="_blank" className="p-1 text-blue-500 hover:text-blue-700 transition-colors rounded hover:bg-blue-100 flex-shrink-0" title="Otvoriť odkaz">

                                    )}
                                  </div>
                                </td>

                                <td className={`p-2 text-center ${tdBorder}`}><button onClick={() => updateCurrentProject(p => ({...p, tasks: (p.tasks||[]).filter(t => t.id !== task.id)}))} className="text-red-400 hover:text-red-600 transition-colors p-1"><Icon name="trash-can" size={16} /></button></td>
                              </tr>
                            )})}
                          </tbody>
                        </table>

                )}

                {/* --- GANTT (Týždňový) --- */}
                {activeTab === 'gantt' && (
                  <div className="bg-white rounded-xl shadow border border-gray-200 flex-1 flex flex-col overflow-hidden p-6 print:hidden">
                    <h2 className="text-xl font-bold text-gray-800 border-b pb-2">Ganttov diagram</h2>
                    <div className="flex-1 overflow-auto"><div className="min-w-[800px]">
                        <ExportGantt ganttData={ganttData} />
                    </div></div>
                  </div>
                )}

                {/* --- MAJETOK --- */}
                {activeTab === 'majetek' && (
                  <div className="bg-white rounded-xl shadow border border-gray-200 flex-1 flex flex-col overflow-hidden print:hidden">
                    <div className="p-4 border-b flex justify-between items-center bg-gray-50/50 print:hidden">
                      <h2 className="text-lg font-semibold text-gray-800">Zošit: Rozpočet a Majetok</h2>
                      <button onClick={() => updateCurrentProject(p => ({...p, assets: [...(p.assets||[]), { id: Date.now().toString(), name: '', quantity: 1, unitPrice: 0, assignedTo: [], status: '1' }] }))} className="flex items-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md text-sm font-medium transition-colors"><Icon name="plus" size={16} /> Pridať položku</button>
                    </div>
                    <div className="overflow-auto flex-1">
                      <table className="w-full text-left border-collapse min-w-max">
                        <thead className="sticky top-0 bg-gray-100 border-b border-gray-300 z-10 shadow-sm">
                          <tr>
                            <th className="p-3 w-8"></th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Názov položky</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-24 text-right">Počet</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-32 text-right">Cena / kus (€)</th>
                            <th className="p-3 text-xs font-semibold text-gray-800 uppercase tracking-wider w-36 text-right bg-gray-200/50">Cena celkom</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-48">Zodpovedná osoba</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-40">Stav</th>
                            <th className="p-3 w-10"></th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {assets.map((asset, index) => {
                            const rowTotal = Number(asset.quantity) * Number(asset.unitPrice);
                            return (
                              <tr key={asset.id} className="hover:bg-blue-50/30 transition-colors group">
                                <td className="p-2 border-r border-gray-100 text-center text-gray-300"><Icon name="grip-vertical" size={16} /></td>
                                <td className="p-2 border-r border-gray-100"><InputCell value={asset.name} onChange={(v) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, name: v} : a)}))} placeholder="Názov majetku..." /></td>
                                <td className="p-2 border-r border-gray-100"><input type="number" value={asset.quantity} onChange={(e) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, quantity: e.target.value} : a)}))} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 text-right" min="0" /></td>
                                <td className="p-2 border-r border-gray-100"><input type="number" value={asset.unitPrice} onChange={(e) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, unitPrice: e.target.value} : a)}))} className="w-full p-1 bg-transparent rounded outline-none hover:bg-gray-50 focus:bg-white focus:ring-1 focus:ring-blue-500 text-right" min="0" /></td>
                                <td className="p-2 border-r border-gray-100 text-right font-medium text-gray-800 bg-gray-50/30">{rowTotal.toLocaleString('sk-SK')} €</td>
                                <td className="p-2 border-r border-gray-100"><MultiUserSelect value={asset.assignedTo} onChange={(v) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, assignedTo: v} : a)}))} users={globalUsers} departments={departments} /></td>
                                <td className="p-2 border-r border-gray-100"><StatusSelect value={asset.status} onChange={(v) => updateCurrentProject(p => ({...p, assets: (p.assets||[]).map(a => a.id === asset.id ? {...a, status: v} : a)}))} /></td>
                                <td className="p-2 text-center"><button onClick={() => updateCurrentProject(p => ({...p, assets: (p.assets||[]).filter(a => a.id !== asset.id)}))} className="text-red-400 hover:text-red-600 transition-colors p-1"><Icon name="trash-can" size={16} /></button></td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot className="sticky bottom-0 bg-gray-100 border-t-2 border-gray-300">
                          <tr>
                            <td colSpan="4" className="p-4 text-right font-bold text-gray-700">CELKOVÉ NÁKLADY:</td>
                            <td className="p-4 text-right font-bold text-xl text-blue-700 whitespace-nowrap">{totalAssetsCost.toLocaleString('sk-SK')} €</td>
                            <td colSpan="3"></td>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                )}

                {/* --- KONTAKTY --- */}
                {activeTab === 'kontakty' && (
                  <div className="bg-white rounded-xl shadow border border-gray-200 flex-1 flex flex-col overflow-hidden print:hidden">
                    <div className="p-4 border-b flex justify-between items-center bg-gray-50/50">
                      <h2 className="text-lg font-semibold text-gray-800">Zošit: Adresár kontaktov</h2>
                      <button onClick={() => updateCurrentProject(p => ({...p, contacts: [...(p.contacts||[]), { id: Date.now().toString(), name: '', position: '', email: '', phone: '' }] }))} className="flex items-center gap-1 px-3 py-1.5 bg-blue-50 text-blue-700 hover:bg-blue-100 rounded-md text-sm font-medium transition-colors"><Icon name="plus" size={16} /> Pridať kontakt</button>
                    </div>
                    <div className="overflow-auto flex-1">
                      <table className="w-full text-left border-collapse min-w-max">
                        <thead className="sticky top-0 bg-gray-100 border-b border-gray-300 z-10 shadow-sm">
                          <tr>
                            <th className="p-3 w-8"></th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">Meno a priezvisko</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-64">Pozícia</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-64">E-mail</th>
                            <th className="p-3 text-xs font-semibold text-gray-600 uppercase tracking-wider w-48">Tel. číslo</th>
                            <th className="p-3 w-10"></th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-gray-200">
                          {contacts.map((contact, index) => (
                            <tr key={contact.id} className="hover:bg-blue-50/30 transition-colors group">
                              <td className="p-2 border-r border-gray-100 text-center text-gray-300"><Icon name="grip-vertical" size={16} /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.name} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, name: v} : c)}))} placeholder="Napr. Ján Novák" /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.position} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, position: v} : c)}))} placeholder="Napr. Manažér pobočky" /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.email} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, email: v} : c)}))} type="email" placeholder="jan@firma.sk" /></td>
                              <td className="p-2 border-r border-gray-100"><InputCell value={contact.phone} onChange={(v) => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).map(c => c.id === contact.id ? {...c, phone: v} : c)}))} type="tel" placeholder="+421..." /></td>
                              <td className="p-2 text-center"><button onClick={() => updateCurrentProject(p => ({...p, contacts: (p.contacts||[]).filter(c => c.id !== contact.id)}))} className="text-red-400 hover:text-red-600 transition-colors p-1"><Icon name="trash-can" size={16} /></button></td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                )}
              </main>

              {/* ========================================================================= */}
              {/* --- SKRYTÉ EXPORT KONTAJNERY PRE PDF SŤAHOVANIE --- */}
              {/* ========================================================================= */}
              
              {/* EXPORT: HARMONOGRAM */}
              <div className="pdf-export-hidden report-mode" id="report-export-container" style={{ padding: '15mm' }}>
                <div className="flex justify-between items-end border-b-2 border-gray-800 pb-4 mb-6">
                  <img src={LOGO_URL} alt="Logo" className="h-14 object-contain" />
                  <div className="text-right">
                    <h1 className="text-2xl font-bold text-gray-900 leading-tight">{currentProject.name}</h1>
                    <p className="text-sm text-gray-700 font-semibold mt-1">
                      {currentProject.startDate && currentProject.endDate ? 
                        `Obdobie: ${new Date(currentProject.startDate).toLocaleDateString('sk-SK')} - ${new Date(currentProject.endDate).toLocaleDateString('sk-SK')}` 
                        : 'Obdobie neurčené'
                      }
                    </p>
                    <p className="text-xs text-gray-500 mt-1">Stav k dátumu: {new Date().toLocaleDateString('sk-SK')}</p>
                  </div>
                </div>
                
                {/* Tím projektu sa tiež tlačí do PDF */}
                <div className="mb-6 page-break-inside-avoid">
                    <ProjectTeamSection isExport={true} />
                </div>
                
                <div className="mb-10">
                  <ExportTasks tasks={tasks} globalUsers={globalUsers} />
                </div>
              </div>

              {/* EXPORT: GANTT */}
              <div className="pdf-export-hidden gantt-mode" id="gantt-export-container" style={{ padding: '15mm' }}>
                <div className="flex justify-between items-end border-b-2 border-gray-800 pb-4 mb-6">
                  <img src={LOGO_URL} alt="Logo" className="h-10 object-contain" />
                  <div className="text-right">
                    <h1 className="text-xl font-bold text-gray-900 leading-tight">{currentProject.name} (Ganttov diagram)</h1>
                    <p className="text-sm text-gray-700 font-semibold mt-1">
                      {currentProject.startDate && currentProject.endDate ? 
                        `Obdobie: ${new Date(currentProject.startDate).toLocaleDateString('sk-SK')} - ${new Date(currentProject.endDate).toLocaleDateString('sk-SK')}` 
                        : 'Obdobie neurčené'
                      }
                    </p>
                    <p className="text-xs text-gray-500 mt-1">Stav k dátumu: {new Date().toLocaleDateString('sk-SK')}</p>
                  </div>
                </div>
                <ExportGantt ganttData={ganttData} />
              </div>

              {/* SPODNÁ LIŠTA EDITOR - IDENTIFIKÁTOR A ODHLÁSENIE */}
              <div className="fixed bottom-0 left-0 w-full bg-gray-900 text-white p-2 px-6 text-xs flex justify-between items-center z-40 print:hidden shadow-lg">
                 <div className="flex items-center gap-4">
                   <span className="flex items-center gap-2">
                     <img src={user?.photoURL || 'https://via.placeholder.com/30'} alt="Avatar" className="w-6 h-6 rounded-full border border-gray-600"/>
                     <span>{user?.displayName} ({user?.email})</span>
                   </span>
                   <span className="border-l border-gray-700 pl-4">Práva: <span className={isAdmin ? 'text-green-400 font-bold' : 'text-blue-300 font-bold'}>{isAdmin ? 'Administrátor (Plný prístup)' : 'Člen rozjazdového tímu'}</span></span>
                 </div>
                 <div className="flex items-center gap-4">
                   {isAdmin && <div className="text-gray-400 border-r border-gray-700 pr-4 mr-1">{APP_VERSION}</div>}
                   <div><span className="text-gray-400">UID:</span> <code className="bg-gray-800 px-2 py-1 rounded select-all font-mono tracking-wider ml-1">{user?.uid}</code></div>
                   <button onClick={handleLogout} className="bg-gray-800 hover:bg-red-600 px-3 py-1 rounded transition-colors text-white border border-gray-700 hover:border-red-500">Odhlásiť sa</button>
                 </div>
              </div>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
